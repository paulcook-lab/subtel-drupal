apiVersion: apps/v1
kind: Deployment
metadata:
  name: drupal
  namespace: subtel
  labels:
    app: drupal
    version: "10"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: drupal
  template:
    metadata:
      labels:
        app: drupal
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
    spec:
      containers:
      - name: drupal
        image: paulcook-lab/subtel-drupal:latest
        imagePullPolicy: Never
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        env:
        - name: DRUPAL_ENV
          valueFrom:
            configMapKeyRef:
              name: drupal-config
              key: DRUPAL_ENV
        - name: DRUPAL_HOST
          valueFrom:
            configMapKeyRef:
              name: drupal-config
              key: DRUPAL_HOST
        - name: DRUPAL_LANGCODE
          valueFrom:
            configMapKeyRef:
              name: drupal-config
              key: DRUPAL_LANGCODE
        - name: DRUPAL_THEME
          valueFrom:
            configMapKeyRef:
              name: drupal-config
              key: DRUPAL_THEME
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_PASSWORD
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_PORT
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /admin
            port: http
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: drupal-files
          mountPath: /var/www/html/web/sites/default/files
      volumes:
      - name: drupal-files
        emptyDir: {}
      securityContext:
        runAsNonRoot: true
        runAsUser: 33
        fsGroup: 33
